<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Pipeline – Bug Report Triage</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <header>
      <h1>🔬 Prompt Pipeline</h1>
      <p class="subtitle">Bug Report Triage — Day 2 GenAI Homework</p>
    </header>

    <div class="card">
      <div class="form-row">
        <label for="model-select">Model</label>
        <select id="model-select">
          {% for m in models %}
          <option value="{{ m }}">{{ m }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-row">
        <label for="bug-input">Bug Report</label>
        <textarea id="bug-input" rows="12" placeholder="Paste your bug report here…"></textarea>
      </div>

      <div class="sample-buttons">
        <span class="sample-label">Sample inputs:</span>
        <button class="btn-sample" data-key="normal">🐛 Normal Bug</button>
        <button class="btn-sample" data-key="tricky">⚠️ Tricky Bug</button>
        <button class="btn-sample" data-key="broken">💥 Broken Input</button>
      </div>

      <button id="run-btn" class="btn-run">▶ Run Pipeline</button>
    </div>

    <div id="output-section" class="hidden">
      <div id="progress-bar-wrap">
        <div id="progress-bar"></div>
        <span id="progress-label">Running…</span>
      </div>
      <div id="results"></div>
    </div>
  </div>

  <script>
    // Sample data injected from Flask
    const SAMPLES = {
      normal: {{ samples.normal | tojson }},
      tricky: {{ samples.tricky | tojson }},
      broken: {{ samples.broken | tojson }}
    };
  </script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
